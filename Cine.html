<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarea Cine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

        <style>
            
        .portada {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://www.concierto.cl/wp-content/uploads/2022/09/Dia-del-cine-1.jpg');
            background-size: cover;
            background-position: center;
            color: white;
            padding: 100px 0;
            text-align: center;
        }

        .card-icon {
            font-size: 50px;
            color: #ffc107;
        }

    </style>

</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#"><i class="bi bi-film me-2"></i>Peliculas</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="#inicio">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="#servicios">Servicios</a></li>
                    <li class="nav-item"><a class="nav-link" href="#contacto">Contacto</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header id="inicio" class="portada">
        <div class="container">
            <div class="row">
                <div class="col-12">
                    <h1 class="display-3 fw-bold">Peliculas</h1>
                    <p class="lead mb-4">Lorem ipsum</p>
                    <a href="#servicios" class="btn btn-warning btn-lg px-4">
                        <i class="bi bi-play-circle-fill me-2"></i>Servicios
                    </a>
                </div>
            </div>
        </div>
    </header>

    <section id="servicios" class="py-5 bg-light">
        <div class="container text-center mb-5">
            <h2 class="fw-bold">Nuestros Servicios</h2>
            <hr class="w-25 mx-auto text-warning border-3 opacity-100">
        </div>
        <div class="container">
            <div class="row g-4">
                <div class="col-12 col-md-6 col-lg-4">
                    <div class="card h-100 border-0 shadow-sm text-center p-4">
                        <div class="card-body">
                            <i class="bi bi-star-fill card-icon mb-3"></i>
                            <h5 class="card-title fw-bold">Reseñas</h5>
                            <p class="card-text text-muted">Lorem Ipsum</p>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-md-6 col-lg-4">
                    <div class="card h-100 border-0 shadow-sm text-center p-4">
                        <div class="card-body">
                            <i class="bi bi-ticket-perforated-fill card-icon mb-3"></i>
                            <h5 class="card-title fw-bold">Próximos Estrenos</h5>
                            <p class="card-text text-muted">Lorem Ipsum</p>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-md-6 col-lg-4">
                    <div class="card h-100 border-0 shadow-sm text-center p-4">
                        <div class="card-body">
                            <i class="bi bi-people-fill card-icon mb-3"></i>
                            <h5 class="card-title fw-bold">Foro</h5>
                            <p class="card-text text-muted">Lorem Ipsum</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="contacto" class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-md-8 col-lg-6">
                    <div class="bg-white p-4 shadow rounded">
                        <h2 class="text-center mb-4">Contáctanos</h2>
                        <form>
                            <div class="mb-3">
                                <label for="nombre" class="form-label">Nombre Completo</label>
                                <input type="text" class="form-control" id="nombre" placeholder="Tu nombre..." required>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Correo Electrónico</label>
                                <input type="email" class="form-control" id="email" placeholder="nombre@ejemplo.com" required>
                            </div>
                            <div class="mb-3">
                                <label for="mensaje" class="form-label">Mensaje</label>
                                <textarea class="form-control" id="mensaje" rows="4" placeholder="¿En qué podemos ayudarte?"></textarea>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-dark">Enviar Mensaje</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-dark text-white py-4 mt-auto">
        <div class="container text-center">
            <p class="mb-3">@ 2026 geriza97 Todos los derechos reservados.</p>
            <div class="fs-4">
                <a href="https://www.facebook.com/" target="_blank" class="text-white me-3"><i class="bi bi-facebook"></i></a>
                <a href="https://twitter.com/" target="_blank" class="text-white me-3"><i class="bi bi-twitter-x"></i></a>
                <a href="https://www.instagram.com/" target="_blank" class="text-white me-3"><i class="bi bi-instagram"></i></a>
                <a href="https://www.youtube.com/" target="_blank" class="text-white"><i class="bi bi-youtube"></i></a>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>    
</body>
</html>
